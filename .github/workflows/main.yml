name: CI Pipeline

on: 
  push: 
    branches:
      - main

jobs: 
  build-and-test:
    runs-on: ubuntu-latest
    steps: 
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: 
          node-version: '20'
      - name: Install Dependencies
        run: npm install
      - name: Run Tests
        run: npm test
      - name: Build Projects
        run: npm run build --if-present
  notify-n8n-on-failure:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: failure()
    steps:
      - name: Trigger n8s Webhook
        run: |
          curl -X POST "${{ secrets.
          N8N_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -H "x-webhook-secret: ${{ secrets.
          N8N_WEBHOOK_SECRET }}" \
          -d '{
          "run_id": "${{ github.run_id }}",
          "repo": "${{ github.repository }}",
          "branch": "${{ github.ref_name }}",
          "commit": "${{ github.sha }}",
          "actor": "${{ github.actor }}"
          }'